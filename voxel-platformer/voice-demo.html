<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voxel Platformer - Dialogue Voice Demo</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #0a0d10;
            --panel: rgba(19, 25, 29, 0.94);
            --border: rgba(176, 204, 196, 0.18);
            --text: #edf8f2;
            --dim: rgba(237, 248, 242, 0.62);
            --accent: #ffd166;
            --good: #8ee6bd;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font: 13px ui-sans-serif, system-ui, sans-serif; }
        #app { height: 100vh; display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 10px; padding: 10px; }
        .panel { min-width: 0; min-height: 0; overflow: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); padding: 12px; }
        h1 { margin: 0 0 6px; color: var(--accent); font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
        h2 { margin: 14px 0 6px; color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
        textarea { width: 100%; min-height: 180px; resize: vertical; border: 1px solid var(--border); border-radius: 6px; background: rgba(0, 0, 0, 0.22); color: var(--text); padding: 8px; font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; }
        button, select, input { border: 1px solid var(--border); border-radius: 6px; background: rgba(34, 43, 49, 0.9); color: var(--text); font: inherit; padding: 6px 8px; }
        button { cursor: pointer; }
        button.primary { border-color: rgba(255, 209, 102, 0.62); background: rgba(255, 209, 102, 0.18); }
        .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .field { display: grid; grid-template-columns: 86px 1fr 48px; gap: 6px; align-items: center; margin: 7px 0; }
        .field label, .value, p { color: var(--dim); }
        input[type=range] { width: 100%; padding: 0; }
        #fantasy { min-height: 110px; white-space: pre-wrap; overflow-wrap: anywhere; border: 1px solid var(--border); border-radius: 8px; background: rgba(0, 0, 0, 0.24); padding: 12px; font: 16px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; }
        canvas { width: 100%; height: 190px; display: block; border: 1px solid var(--border); border-radius: 8px; background: rgba(0, 0, 0, 0.24); }
        .stat { display: flex; justify-content: space-between; gap: 10px; color: var(--dim); font: 12px ui-monospace, monospace; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
        .stat b { color: var(--good); }
    </style>
</head>
<body>
    <div id="app">
        <aside class="panel">
            <h1>Dialogue Voice</h1>
            <p>Procedural fantasy-babble renderer used by in-game dialogue speakers.</p>
            <h2>Voice</h2>
            <label class="field"><label for="preset">Preset</label><select id="preset"></select><span></span></label>
            <label class="field"><label for="seed">Seed</label><input id="seed" type="text" value="keeper-arlen" /><span></span></label>
            <label class="field"><label for="volume">Volume</label><input id="volume" type="range" min="0" max="1" step="0.01" value="0.55" /><span class="value" id="volumeValue"></span></label>
            <label class="field"><label for="rate">Rate</label><input id="rate" type="range" min="0.45" max="4" step="0.01" value="1" /><span class="value" id="rateValue"></span></label>
            <label class="field"><label for="pitch">Pitch</label><input id="pitch" type="range" min="-36" max="36" step="1" value="0" /><span class="value" id="pitchValue"></span></label>
            <div class="row"><button id="render" class="primary">Render</button><button id="play">Play</button><button id="download">Download WAV</button></div>
            <h2>Stats</h2>
            <div class="stat"><span>Duration</span><b id="duration">0.00s</b></div>
            <div class="stat"><span>Samples</span><b id="samples">0</b></div>
            <div class="stat"><span>Fantasy words</span><b id="words">0</b></div>
        </aside>
        <main class="panel">
            <h1>Line</h1>
            <textarea id="text">Welcome, traveler. The old bridge remembers every footstep.</textarea>
            <h2>Fantasy Line</h2>
            <div id="fantasy"></div>
            <h2>Waveform</h2>
            <canvas id="wave" width="1200" height="240"></canvas>
        </main>
    </div>
    <script type="module" src="/src/voice-demo.ts"></script>
</body>
</html>
